  ".randomInt(":             [crypto]
  ".randomUUID(":            [crypto]
  ".scrypt(":                [crypto]
  ".scryptSync(":            [crypto]
  ".pbkdf2(":                [crypto]
  ".pbkdf2Sync(":            [crypto]
  ".sign(":                  [crypto]
  ".verify(":                [crypto]

  # ── Dynamic loading ───────────────────────────────────────────────────────
  "module.createRequire(":   [plugin]
  "require.resolve(":        [plugin]
  "Module._load(":           [plugin]
  "Module._resolveFilename(": [plugin]
