  "reflect-metadata":   [reflect]
  "class-transformer":  [reflect]
  "class-validator":    [reflect]

# call_sites: substring patterns matched against each source line
call_sites:
  # ── Code execution / sandbox escape ───────────────────────────────────────
  "eval(":                   [unsafe]
  "new Function(":           [unsafe]
  "vm.runInNewContext(":     [unsafe]
  "vm.runInThisContext(":    [unsafe]
  "vm.runInContext(":        [unsafe]
  "vm.compileFunction(":     [unsafe]
  "vm.Script(":              [unsafe]
  "require('vm')":           [unsafe]

  # ── Process execution ─────────────────────────────────────────────────────
  "child_process.exec(":     [exec]
  "child_process.execSync(": [exec]
  "child_process.execFile(": [exec]
  "child_process.execFileSync(": [exec]
  "child_process.spawn(":    [exec]
  "child_process.spawnSync(": [exec]
  "child_process.fork(":     [exec]
  "worker_threads.Worker(":  [exec]
  "process.exit(":           [exec]
  "process.kill(":           [exec]
  "process.abort(":          [exec]
  "process.binding(":        [unsafe, exec]
  "process.chdir(":          [fs:read]
  "process.cwd(":            [fs:read]

  # ── Network ───────────────────────────────────────────────────────────────
  "globalThis.fetch(":       [network]
  "window.fetch(":           [network]
  "axios.":                  [network]
  "axios.get(":              [network]
  "axios.post(":             [network]
  "axios.put(":              [network]
  "axios.patch(":            [network]
  "axios.delete(":           [network]
  "http.request(":           [network]
  "https.request(":          [network]
  "http.get(":               [network]
  "https.get(":              [network]
  "net.connect(":            [network]
  "tls.connect(":            [network]
  "got(":                    [network]
  "got.get(":                [network]
  "got.post(":               [network]
  "superagent.":             [network]

  # ── Filesystem reads ──────────────────────────────────────────────────────
  "fs.readFile(":            [fs:read]
  "fs.readFileSync(":        [fs:read]
  "fs.promises.readFile(":   [fs:read]
  "fs.readdir(":             [fs:read]
  "fs.readdirSync(":         [fs:read]
  "fs.readlink(":            [fs:read]
  "fs.readlinkSync(":        [fs:read]
  "fs.stat(":                [fs:read]
  "fs.statSync(":            [fs:read]
  "fs.lstat(":               [fs:read]
  "fs.lstatSync(":           [fs:read]
  "fs.realpath(":            [fs:read]
  "fs.realpathSync(":        [fs:read]
  "fs.access(":              [fs:read]
  "fs.accessSync(":          [fs:read]
  "fs.createReadStream(":    [fs:read]
  "fs.opendir(":             [fs:read]
  "fs.opendirSync(":         [fs:read]

  # ── Filesystem writes ─────────────────────────────────────────────────────
  "fs.writeFile(":           [fs:write]
  "fs.writeFileSync(":       [fs:write]
  "fs.promises.writeFile(":  [fs:write]
  "fs.appendFile(":          [fs:write]
  "fs.appendFileSync(":      [fs:write]
  "fs.unlink(":              [fs:write]
  "fs.unlinkSync(":          [fs:write]
  "fs.rmdir(":               [fs:write]
  "fs.rmdirSync(":           [fs:write]
  "fs.rm(":                  [fs:write]
  "fs.rmSync(":              [fs:write]
  "fs.mkdir(":               [fs:write]
  "fs.mkdirSync(":           [fs:write]
  "fs.mkdtemp(":             [fs:write]
  "fs.mkdtempSync(":         [fs:write]
  "fs.rename(":              [fs:write]
  "fs.renameSync(":          [fs:write]
  "fs.copyFile(":            [fs:write]
  "fs.copyFileSync(":        [fs:write]
  "fs.symlink(":             [fs:write]
  "fs.symlinkSync(":         [fs:write]
  "fs.link(":                [fs:write]
  "fs.linkSync(":            [fs:write]
  "fs.chmod(":               [fs:write]
  "fs.chmodSync(":           [fs:write]
  "fs.chown(":               [fs:write]
  "fs.chownSync(":           [fs:write]
  "fs.truncate(":            [fs:write]
  "fs.truncateSync(":        [fs:write]
  "fs.createWriteStream(":   [fs:write]

  # ── Environment ───────────────────────────────────────────────────────────
  "process.env":             [env]

  # ── Crypto call sites ─────────────────────────────────────────────────────
  ".createHash(":            [crypto]
  ".createHmac(":            [crypto]
  ".createCipheriv(":        [crypto]
  ".createDecipheriv(":      [crypto]
