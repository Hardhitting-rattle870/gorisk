  ".createVerify(":          [crypto]
  ".createDiffieHellman(":   [crypto]
  ".createECDH(":            [crypto]
  ".generateKeyPair(":       [crypto]
  ".generateKeyPairSync(":   [crypto]
  ".randomBytes(":           [crypto]
